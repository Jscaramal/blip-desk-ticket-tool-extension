<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Desk Ticket Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="wrap">
    <h1>Desk Ticket Helper</h1>

    <div class="row">
      <label for="apiKeyInput">API Key:</label>
      <div class="input-with-copy">
        <input id="apiKeyInput" type="text" placeholder="cole aqui" />
        <button id="btnCopyApiKey" class="btn-copy" title="Copiar API Key">📋</button>
      </div>
    </div>

    <div class="row">
      <label for="botInput">Bot:</label>
      <div class="input-with-copy">
        <input id="botInput" type="text" placeholder="ex: scarathuhmg" />
        <button id="btnCopyBot" class="btn-copy" title="Copiar Bot">📋</button>
      </div>
      <button id="btnSaveConfig" class="btn-save">Salvar</button>
    </div>

    <hr />

    <div class="row">
      <button id="btnCreateOne">Criar 1 ticket</button>
    </div>

    <div class="row row-create-with-icon">
      <div class="create-controls">
        <label>
          Quantidade:
          <input id="qty" class="input-compact" type="number" min="1" max="500" value="10" />
        </label>
        <label>
          Lote:
          <input id="batchSize" class="input-compact" type="number" min="1" max="50" value="10" />
        </label>
        <label>
          Delay (ms):
          <input id="delayMs" class="input-compact" type="number" min="0" max="10000" value="400" />
        </label>
        <button id="btnCreateMany" class="btn-create-many">Criar N (em lotes)</button>
      </div>
      <div class="side-icon-card" title="Desk Ticket Helper">
        <img src="img/mage_blip.png" alt="Desk Ticket Helper" />
      </div>
    </div>

    <hr />

    <div class="row row-actions">
      <button id="btnProbe">Testar captura (agent/tickets)</button>
      <button id="btnCloseAll" class="btn-close">⚠️ Fechar TODOS os tickets</button>
    </div>

    <div class="log-panel">
      <div class="log-toolbar">
        <span class="log-title">Logs</span>
        <div class="log-actions">
          <button id="btnCopyLogs" class="btn-log-action" type="button" title="Copiar todos os logs">Copiar</button>
          <button id="btnClearLogs" class="btn-log-action" type="button" title="Limpar logs">Limpar</button>
        </div>
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
